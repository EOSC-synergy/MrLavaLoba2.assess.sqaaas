        - /usr/bin/env sh .sqa/script.sleepy-amber-dollar.sh
        container: qc.met_shabby-carmine-moorhen
  QC.Sec:
    repos:
      github.com/demichie/MrLavaLoba2 bandit:
        commands:
        - /usr/bin/env sh .sqa/script.bumpy-chartreuse-tetra.sh
        container: qc.sec_scanty-bistre-tapir
  QC.Sty:
    repos:
      github.com/demichie/MrLavaLoba2 flake8:
        commands:
        - /usr/bin/env sh .sqa/script.stealthy-chartreuse-anteater.sh
        container: qc.sty_foggy-cerise-lemming
  QC.Uni:
    repos:
      github.com/demichie/MrLavaLoba2 pytest:
        commands:
        - /usr/bin/env sh .sqa/script.scanty-red-jaguar.sh
        container: qc.uni_foggy-russet-mongoose
