config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/demichie/MrLavaLoba2:
      branch: main
      repo: https://github.com/demichie/MrLavaLoba2
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/demichie/MrLavaLoba2 git:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-rust-serval.sh
        container: qc.acc_woolly-apricot-mayfly
  QC.Doc:
    repos:
      github.com/demichie/MrLavaLoba2 find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-burgundy-eel.sh
        container: qc.doc_wiggy-flax-mole
      github.com/demichie/MrLavaLoba2 git:
        commands:
        - /usr/bin/env sh .sqa/script.cheeky-magenta-rhinoceros.sh
        container: qc.doc_wiggy-alizarin-havanese
      github.com/demichie/MrLavaLoba2 markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-red-snake.sh
        container: qc.doc_squeaky-beige-emu
  QC.Lic:
    repos:
      github.com/demichie/MrLavaLoba2 licensee:
        commands:
        - /usr/bin/env sh .sqa/script.lousy-wisteria-lion.sh
        container: qc.lic_sloppy-magenta-wolverine
  QC.Met:
    repos:
      github.com/demichie/MrLavaLoba2 cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-yellow-wrasse.sh
        container: qc.met_beady-cardinal-pinscher
  QC.Sec:
    repos:
      github.com/demichie/MrLavaLoba2 bandit:
        commands:
        - /usr/bin/env sh .sqa/script.wimpy-platinum-schnauzer.sh
        container: qc.sec_foggy-rose-ladybird
  QC.Sty:
    repos:
      github.com/demichie/MrLavaLoba2 flake8:
        commands:
        - /usr/bin/env sh .sqa/script.lanky-brass-angora.sh
        container: qc.sty_scaly-lavender-zonkey
  QC.Uni:
    repos:
      github.com/demichie/MrLavaLoba2 pytest:
        commands:
        - /usr/bin/env sh .sqa/script.foggy-myrtle-stoat.sh
        container: qc.uni_fuzzy-carmine-baboon
  QC.Ver:
    repos:
      github.com/demichie/MrLavaLoba2 get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.lousy-cobalt-birman.sh
        container: qc.ver_cloudy-harlequin-quetzal
timeout: 5400
