config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/demichie/MrLavaLoba2:
      branch: main
      repo: https://github.com/demichie/MrLavaLoba2/
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/demichie/MrLavaLoba2 git:
        commands:
        - /usr/bin/env sh .sqa/script.zippy-buff-axolotl.sh
        container: qc.acc_silly-tangerine-civet
  QC.Doc:
    repos:
      github.com/demichie/MrLavaLoba2 find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.flabby-tangerine-chipmunk.sh
        container: qc.doc_gamy-wheat-fly
      github.com/demichie/MrLavaLoba2 git:
        commands:
        - /usr/bin/env sh .sqa/script.scaly-lemon-peccary.sh
        container: qc.doc_breezy-russet-chihuahua
      github.com/demichie/MrLavaLoba2 markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.scummy-viridian-dolphin.sh
        container: qc.doc_lousy-magnolia-slug
  QC.Lic:
    repos:
      github.com/demichie/MrLavaLoba2 licensee:
        commands:
        - /usr/bin/env sh .sqa/script.queasy-plum-macaque.sh
        container: qc.lic_gamy-peach-lionfish
  QC.Met:
    repos:
      github.com/demichie/MrLavaLoba2 cff-converter-python:
        commands:
        - /usr/bin/env sh .sqa/script.fuzzy-amethyst-havanese.sh
        container: qc.met_sunny-champagne-beagle
  QC.Sec:
    repos:
      github.com/demichie/MrLavaLoba2 bandit:
        commands:
        - /usr/bin/env sh .sqa/script.scanty-amaranth-chimpanzee.sh
        container: qc.sec_pretty-saffron-stingray
  QC.Sty:
    repos:
      github.com/demichie/MrLavaLoba2 flake8:
        commands:
        - /usr/bin/env sh .sqa/script.breezy-asparagus-raccoon.sh
        container: qc.sty_snoopy-silver-gorilla
  QC.Uni:
    repos:
      github.com/demichie/MrLavaLoba2 pytest:
        commands:
        - /usr/bin/env sh .sqa/script.hasty-champagne-nightingale.sh
        container: qc.uni_lovely-fuchsia-frog
  QC.Ver:
    repos:
      github.com/demichie/MrLavaLoba2 get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.cloudy-cobalt-opossum.sh
        container: qc.ver_messy-ultramarine-affenpinscher
timeout: 5400
